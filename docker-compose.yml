version: "3.8"

services:
  backend:
    build: ./backend
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE=/data/scheduler.db
    volumes:
      - ./data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./scheduler.html:/var/www/html/scheduler.html:ro
      - ./scheduler.js:/var/www/html/scheduler.js:ro
      - ./scheduler.css:/var/www/html/scheduler.css:ro
      - ./settings.js:/var/www/html/settings.js:ro
    depends_on:
      - backend
    restart: unless-stopped
